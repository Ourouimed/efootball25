<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Draw App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Team Draw App</h1>

        <!-- Display Teams -->
        <div id="teams-section">
            <h2>Teams</h2>
            <ul id="team-list"></ul>
        </div>

        <!-- Perform Draw Button -->
        <button id="draw-button">Perform Draw</button>

        <!-- Display Gameweeks -->
        <div id="gameweeks-section" style="display: none;">
            <h2>Gameweeks</h2>
            <pre id="gameweeks-result"></pre>
        </div>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
